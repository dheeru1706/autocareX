version: '3.8'

# Minimal local dev setup — only runs infrastructure (postgres + redis)
# Backend and Admin run natively with npm for hot-reload
#
# Usage:
#   docker-compose -f docker-compose.local.yml up -d
#   Then: cd backend && npm run dev
#   Then: cd admin && npm run dev

services:
  postgres:
    image: postgres:15-alpine
    container_name: autocareX_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: autocareX_dev
      POSTGRES_USER: autocareX
      POSTGRES_PASSWORD: devpassword123
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autocareX -d autocareX_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: autocareX_redis
    restart: unless-stopped
    command: redis-server --requirepass devredis123 --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "devredis123", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: autocareX_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@autocareX.dev
      PGADMIN_DEFAULT_PASSWORD: pgadmin123
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data:
  redis_data:
