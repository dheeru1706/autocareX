version: '3.8'

services:
  # ─── PostgreSQL Database ───────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: autocareX_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-autocareX}
      POSTGRES_USER: ${POSTGRES_USER:-autocareX}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    networks:
      - autocareX_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-autocareX} -d ${POSTGRES_DB:-autocareX}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─── Redis Cache ────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: autocareX_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --appendfsync everysec
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - autocareX_network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend API ────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: autocareX_backend
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-autocareX}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-autocareX}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - autocareX_network
    volumes:
      - uploads:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ─── Admin Panel ────────────────────────────────────────────
  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-https://api.autocareX.in/api/v1}
    container_name: autocareX_admin
    restart: unless-stopped
    networks:
      - autocareX_network
    depends_on:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ─── Nginx Reverse Proxy ────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: autocareX_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      backend:
        condition: service_healthy
      admin:
        condition: service_healthy
    networks:
      - autocareX_network
    healthcheck:
      test: ["CMD-SHELL", "nginx -t && wget -qO- http://localhost:80/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Worker (Background Jobs) ──────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: autocareX_worker
    restart: unless-stopped
    command: node src/workers/index.js
    env_file: .env
    environment:
      NODE_ENV: production
      WORKER_MODE: "true"
      DATABASE_URL: postgresql://${POSTGRES_USER:-autocareX}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-autocareX}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - autocareX_network

# ─── Volumes ────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  uploads:
    driver: local
  nginx_logs:
    driver: local

# ─── Networks ───────────────────────────────────────────────
networks:
  autocareX_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
