name: Deploy — Staging

on:
  push:
    branches: [develop]
  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: false

env:
  AWS_REGION: ap-south-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-south-1.amazonaws.com
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # ─────────────────────────────────────────────────────────────
  # Build & Push to ECR (staging tags)
  # ─────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Staging Images
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/autocareX-backend:staging-${{ env.IMAGE_TAG }}
            ${{ env.ECR_REGISTRY }}/autocareX-backend:staging-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push admin image
        uses: docker/build-push-action@v5
        with:
          context: ./admin
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/autocareX-admin:staging-${{ env.IMAGE_TAG }}
            ${{ env.ECR_REGISTRY }}/autocareX-admin:staging-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_API_URL=https://api-staging.autocareX.in/api/v1

  # ─────────────────────────────────────────────────────────────
  # Deploy to Staging EC2
  # ─────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Staging EC2
    runs-on: ubuntu-latest
    needs: [build-and-push]
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to Staging EC2
        uses: appleboy/ssh-action@v1.0.3
        env:
          IMAGE_TAG: staging-${{ env.IMAGE_TAG }}
          ECR_REGISTRY: ${{ env.ECR_REGISTRY }}
          AWS_REGION: ${{ env.AWS_REGION }}
        with:
          host: ${{ secrets.STAGING_EC2_HOST }}
          username: ${{ secrets.STAGING_EC2_USER }}
          key: ${{ secrets.STAGING_EC2_SSH_KEY }}
          envs: IMAGE_TAG,ECR_REGISTRY,AWS_REGION
          script: |
            set -e

            echo "=== AutoCareX Staging Deploy ==="
            echo "Image tag: $IMAGE_TAG"

            # Login to ECR
            aws ecr get-login-password --region $AWS_REGION | \
              docker login --username AWS --password-stdin $ECR_REGISTRY

            # Pull latest staging images
            docker pull $ECR_REGISTRY/autocareX-backend:$IMAGE_TAG
            docker pull $ECR_REGISTRY/autocareX-admin:$IMAGE_TAG

            docker tag $ECR_REGISTRY/autocareX-backend:$IMAGE_TAG autocareX-backend:latest
            docker tag $ECR_REGISTRY/autocareX-admin:$IMAGE_TAG autocareX-admin:latest

            cd /opt/autocareX-staging

            # Run migrations
            echo "Running migrations on staging..."
            docker-compose run --rm backend node src/database/migrate.js

            # Restart all services
            docker-compose up -d backend admin
            docker-compose exec -T nginx nginx -s reload

            # Seed test data on staging if flag set
            if [ -f .seed_on_deploy ]; then
              echo "Seeding staging database..."
              docker-compose run --rm backend node src/database/seeds/staging.js
            fi

            echo "=== Staging deploy complete ==="

      - name: Run staging smoke tests
        run: |
          sleep 15
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://api-staging.autocareX.in/health)
          if [ "$STATUS" != "200" ]; then
            echo "FAILED: Staging API health check returned $STATUS"
            exit 1
          fi
          echo "Staging health check: OK"

  # ─────────────────────────────────────────────────────────────
  # Notify
  # ─────────────────────────────────────────────────────────────
  notify:
    name: Slack Notification
    runs-on: ubuntu-latest
    needs: [deploy]
    if: always()

    steps:
      - name: Notify Slack — Staging Deploy
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "channel": "#autocareX-staging",
              "username": "Staging Bot",
              "icon_emoji": "${{ needs.deploy.result == 'success' && ':white_check_mark:' || ':warning:' }}",
              "text": "${{ needs.deploy.result == 'success' && '✅ Staging deploy successful' || '⚠️ Staging deploy failed' }}",
              "attachments": [{
                "color": "${{ needs.deploy.result == 'success' && '#2eb886' || '#e01e5a' }}",
                "fields": [
                  { "title": "Branch", "value": "${{ github.ref_name }}" },
                  { "title": "Commit", "value": "<${{ github.event.head_commit.url }}|${{ github.sha }}>" },
                  { "title": "Author", "value": "${{ github.actor }}" },
                  { "title": "Staging URL", "value": "<https://admin-staging.autocareX.in|admin-staging.autocareX.in>", "short": true }
                ]
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
