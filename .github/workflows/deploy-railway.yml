name: Deploy Backend to Railway

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'railway.json'
      - '.github/workflows/deploy-railway.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Railway via GraphQL API (with current commit SHA)
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          COMMIT_SHA="${{ github.sha }}"
          SERVICE_ID="90ed4d19-42b9-46c0-82fa-e03af9622a60"
          ENV_ID="352fcb21-d621-4080-b105-177bce40f4f0"

          echo "Deploying commit $COMMIT_SHA to Railway..."

          RESPONSE=$(curl -s -X POST "https://backboard.railway.com/graphql/v2" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -d "{
              \"query\": \"mutation { serviceInstanceDeployV2(serviceId: \\\"$SERVICE_ID\\\", environmentId: \\\"$ENV_ID\\\", commitSha: \\\"$COMMIT_SHA\\\") }\"
            }")

          echo "Response: $RESPONSE"

          echo "$RESPONSE" | python3 -c "
          import json, sys
          d = json.load(sys.stdin)
          dep_id = d.get('data', {}).get('serviceInstanceDeployV2')
          if dep_id:
              print(f'✅ Railway deployment triggered: {dep_id}')
          else:
              print('❌ Deploy failed:', d)
              exit(1)
          "
