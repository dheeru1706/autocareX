name: Deploy Backend to Railway

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'railway.json'
      - '.github/workflows/deploy-railway.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Trigger Railway redeploy via GraphQL API
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          RESPONSE=$(curl -s -X POST "https://backboard.railway.com/graphql/v2" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -d '{
              "query": "mutation { serviceInstanceRedeploy(serviceId: \"90ed4d19-42b9-46c0-82fa-e03af9622a60\", environmentId: \"352fcb21-d621-4080-b105-177bce40f4f0\") }"
            }')
          echo "Response: $RESPONSE"
          echo "$RESPONSE" | python3 -c "
          import json, sys
          d = json.load(sys.stdin)
          if d.get('data', {}).get('serviceInstanceRedeploy') == True:
              print('✅ Railway redeploy triggered successfully')
          else:
              print('❌ Deploy failed:', d)
              exit(1)
          "
