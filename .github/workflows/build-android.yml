name: Build Android APK / AAB

on:
  push:
    branches: [main]
    paths:
      - 'mobile/**'
      - '.github/workflows/build-android.yml'
  workflow_dispatch:          # Manual trigger from GitHub UI

jobs:
  build:
    name: Build Release AAB
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ──────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Java (required for Android build) ─────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ── Flutter ───────────────────────────────────────────────
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: stable
          cache: true

      # ── Android Keystore ──────────────────────────────────────
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > mobile/autocareX.keystore

      - name: Create key.properties
        run: |
          cat > mobile/android/key.properties <<EOF
          storePassword=${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=../../autocareX.keystore
          EOF

      # ── Firebase config ───────────────────────────────────────
      - name: Write google-services.json
        run: |
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > mobile/android/app/google-services.json

      # ── Dependencies ──────────────────────────────────────────
      - name: Flutter pub get
        working-directory: mobile
        run: flutter pub get

      # ── Build AAB (Play Store) ────────────────────────────────
      - name: Build release AAB
        working-directory: mobile
        run: flutter build appbundle --release --build-number=${{ github.run_number }}

      # ── Build APK (direct install / testing) ──────────────────
      - name: Build release APK
        working-directory: mobile
        run: flutter build apk --release --split-per-abi --build-number=${{ github.run_number }}

      # ── Upload artifacts ──────────────────────────────────────
      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: autocareX-release-aab
          path: mobile/build/app/outputs/bundle/release/*.aab
          retention-days: 30

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: autocareX-release-apks
          path: mobile/build/app/outputs/flutter-apk/*.apk
          retention-days: 30
