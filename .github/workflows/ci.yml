name: CI — Lint, Test & Build

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  # ─────────────────────────────────────────────────────────────
  # Job 1: Lint (backend + admin)
  # ─────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            admin/package-lock.json

      - name: Install backend deps
        working-directory: backend
        run: npm ci

      - name: Install admin deps
        working-directory: admin
        run: npm ci --legacy-peer-deps

      - name: Lint backend
        working-directory: backend
        run: npm run lint

      - name: Lint admin
        working-directory: admin
        run: npm run lint

  # ─────────────────────────────────────────────────────────────
  # Job 2: Backend Tests (Jest + Supertest)
  # ─────────────────────────────────────────────────────────────
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: [lint]

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: autocareX_test
          POSTGRES_USER: autocareX_test
          POSTGRES_PASSWORD: testpassword123
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend deps
        working-directory: backend
        run: npm ci

      - name: Run database migrations
        working-directory: backend
        env:
          DATABASE_URL: postgresql://autocareX_test:testpassword123@localhost:5432/autocareX_test
        run: npm run migrate

      - name: Run tests with coverage
        working-directory: backend
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://autocareX_test:testpassword123@localhost:5432/autocareX_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test_jwt_secret_minimum_32_characters_long
          RAZORPAY_KEY_ID: rzp_test_key
          RAZORPAY_KEY_SECRET: test_secret
        run: npm run test:coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: backend/coverage/lcov.info
          flags: backend
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ─────────────────────────────────────────────────────────────
  # Job 3: Admin Panel Build
  # ─────────────────────────────────────────────────────────────
  test-admin:
    name: Admin Panel Build
    runs-on: ubuntu-latest
    needs: [lint]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: admin/package-lock.json

      - name: Install deps
        working-directory: admin
        run: npm ci --legacy-peer-deps

      - name: Build production bundle
        working-directory: admin
        env:
          VITE_API_URL: https://api.autocareX.in/api/v1
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: admin-dist
          path: admin/dist/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────
  # Job 4: Flutter Tests
  # ─────────────────────────────────────────────────────────────
  test-flutter:
    name: Flutter Tests
    runs-on: ubuntu-latest
    needs: [lint]
    if: ${{ hashFiles('mobile/**') != '' }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: stable
          cache: true

      - name: Get Flutter packages
        working-directory: mobile
        run: flutter pub get

      - name: Run Flutter analyze
        working-directory: mobile
        run: flutter analyze

      - name: Run Flutter tests
        working-directory: mobile
        run: flutter test --coverage

  # ─────────────────────────────────────────────────────────────
  # Job 5: Docker Build Validation
  # ─────────────────────────────────────────────────────────────
  build-docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [test-backend, test-admin]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image (validation only)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NODE_ENV=production

      - name: Build admin image (validation only)
        uses: docker/build-push-action@v5
        with:
          context: ./admin
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_API_URL=https://api.autocareX.in/api/v1

      - name: Scan backend image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: ./backend
          severity: CRITICAL,HIGH
          exit-code: 1
          ignore-unfixed: true
        continue-on-error: true
