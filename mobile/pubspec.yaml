name: autocareX
description: AutoCareX - Premium Automotive Super App for India
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.0

  # Navigation
  go_router: ^13.0.0

  # Networking
  dio: ^5.4.0

  # Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  hive_flutter: ^1.1.0
  path_provider: ^2.1.2

  # Maps & Location
  google_maps_flutter: ^2.5.0
  geolocator: ^11.0.0

  # Firebase
  firebase_core: ^2.24.0
  firebase_messaging: ^14.7.0
  firebase_analytics: ^10.8.0

  # Payments
  razorpay_flutter: ^1.3.6

  # Media
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.9

  # Animations
  flutter_animate: ^4.5.0
  lottie: ^3.0.0
  flutter_staggered_animations: ^1.1.1

  # UI Components
  google_fonts: ^6.1.0
  shimmer: ^3.0.0
  pin_code_fields: ^8.0.1
  smooth_page_indicator: ^1.1.0
  bottom_navy_bar: ^6.1.0
  percent_indicator: ^4.2.3
  expandable: ^5.0.1
  badges: ^3.1.2
  auto_size_text: ^3.0.0
  dotted_border: ^2.1.0
  table_calendar: ^3.0.9
  fl_chart: ^0.66.0

  # Utilities
  intl: ^0.19.0
  connectivity_plus: ^5.0.2
  flutter_local_notifications: ^17.0.0

  # Real-time
  socket_io_client: ^2.0.3+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/fonts/
  # Inter font loaded at runtime via google_fonts package (no local TTF needed)
